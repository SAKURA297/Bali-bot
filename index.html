<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Конвертер валют</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --card: #1e2330;
    --border: #2a3042;
    --accent: #f0b429;
    --accent2: #4fd1c5;
    --text: #eef0f6;
    --muted: #7b8299;
    --success: #48c78e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    padding: 20px 20px 0;
    position: relative;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #e08e0b);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(240,180,41,0.3);
  }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--muted);
    margin-left: 52px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 16px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* ── CONVERTER CARD ── */
  .converter {
    margin: 16px 20px 0;
    background: var(--card);
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .field {
    padding: 16px 18px;
    position: relative;
  }
  .field:first-child { border-bottom: 1px solid var(--border); }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .currency-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    min-width: 110px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .currency-btn:active { transform: scale(0.96); }
  .currency-flag { font-size: 20px; }
  .currency-code {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .currency-arrow {
    margin-left: auto;
    color: var(--muted);
    font-size: 10px;
  }

  .amount-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    text-align: right;
    width: 100%;
    min-width: 0;
  }
  .amount-input::placeholder { color: var(--border); }
  .amount-input:read-only { color: var(--accent2); cursor: default; }

  /* swap button */
  .swap-wrap {
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .swap-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 50%;
    border: 3px solid var(--card);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    margin: -20px 0;
    font-size: 16px;
    transition: transform 0.3s;
    box-shadow: 0 2px 12px rgba(240,180,41,0.4);
  }
  .swap-btn:active { transform: rotate(180deg) scale(0.9); }

  /* ── RATE ROW ── */
  .rate-row {
    margin: 14px 20px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
  }
  .rate-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .rate-text { font-size: 13px; color: var(--muted); flex: 1; }
  .rate-value { font-size: 13px; font-weight: 600; color: var(--text); }

  /* ── QUICK AMOUNTS ── */
  .quick-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin: 20px 20px 10px;
  }
  .quick-amounts {
    display: flex;
    gap: 8px;
    padding: 0 20px;
    flex-wrap: wrap;
  }
  .quick-btn {
    padding: 8px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .quick-btn:active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* ── ALL RATES TABLE ── */
  .rates-section {
    margin: 20px 20px 0;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .rate-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    transition: all 0.15s;
    cursor: pointer;
  }
  .rate-item:active { border-color: var(--accent); }
  .rate-flags { font-size: 18px; letter-spacing: -2px; }
  .rate-pair {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    flex: 1;
  }
  .rate-num {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
  }
  .rate-sub { font-size: 11px; color: var(--muted); }

  /* ── CURRENCY PICKER SHEET ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: all; }

  .sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 0 0 40px;
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 80vh;
    overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 16px;
  }
  .sheet-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .currency-option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .currency-option:active { background: var(--card); }
  .curr-flag { font-size: 28px; }
  .curr-info { flex: 1; }
  .curr-code-big {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }
  .curr-name { font-size: 12px; color: var(--muted); }
  .curr-check { color: var(--accent); font-size: 18px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-icon">💱</div>
    <div class="header-title">Обмен валют</div>
  </div>
  <div class="header-sub">Актуальные курсы · Бали</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('converter', this)">Калькулятор</div>
  <div class="tab" onclick="switchTab('rates', this)">Все курсы</div>
</div>

<!-- ── CONVERTER TAB ── -->
<div id="tab-converter">
  <div class="converter">
    <div class="field">
      <div class="field-label">Отдаю</div>
      <div class="field-row">
        <button class="currency-btn" onclick="openSheet('from')">
          <span class="currency-flag" id="from-flag">🇺🇸</span>
          <span class="currency-code" id="from-code">USD</span>
          <span class="currency-arrow">▼</span>
        </button>
        <input class="amount-input" id="from-input" type="number" placeholder="0"
               inputmode="decimal" oninput="convert()">
      </div>
    </div>

    <div class="swap-wrap">
      <div class="swap-btn" onclick="swapCurrencies()">⇅</div>
    </div>

    <div class="field">
      <div class="field-label">Получаю</div>
      <div class="field-row">
        <button class="currency-btn" onclick="openSheet('to')">
          <span class="currency-flag" id="to-flag">🇮🇩</span>
          <span class="currency-code" id="to-code">IDR</span>
          <span class="currency-arrow">▼</span>
        </button>
        <input class="amount-input" id="to-input" type="number" placeholder="0"
               inputmode="decimal" readonly>
      </div>
    </div>
  </div>

  <div class="rate-row">
    <div class="rate-dot"></div>
    <div class="rate-text">Курс обмена</div>
    <div class="rate-value" id="rate-display">1 USD = 16 350 IDR</div>
  </div>

  <div class="quick-label">Быстрый выбор</div>
  <div class="quick-amounts">
    <div class="quick-btn" onclick="setAmount(100)">100</div>
    <div class="quick-btn" onclick="setAmount(500)">500</div>
    <div class="quick-btn" onclick="setAmount(1000)">1 000</div>
    <div class="quick-btn" onclick="setAmount(5000)">5 000</div>
    <div class="quick-btn" onclick="setAmount(10000)">10 000</div>
  </div>
</div>

<!-- ── RATES TAB ── -->
<div id="tab-rates" style="display:none">
  <div class="rates-section">
    <div class="section-title">Фиатные валюты → IDR</div>
    <div id="fiat-rates"></div>
    <div class="section-title" style="margin-top:16px">Крипто / VND</div>
    <div id="crypto-rates"></div>
  </div>
</div>

<!-- ── CURRENCY PICKER SHEET ── -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Выберите валюту</div>
  <div id="sheet-options"></div>
</div>

<script>
// ── ДАННЫЕ (должны совпадать с bot.py) ──────────────────
const RATES = {
  USD:  { flag:"🇺🇸", name:"Доллар США",          idr: 16350 },
  EUR:  { flag:"🇪🇺", name:"Евро",                 idr: 17800 },
  RUB:  { flag:"🇷🇺", name:"Российский рубль",     idr: 183   },
  AUD:  { flag:"🇦🇺", name:"Австр. доллар",         idr: 10200 },
  SGD:  { flag:"🇸🇬", name:"Сингапурский доллар",  idr: 12100 },
  VND:  { flag:"🇻🇳", name:"Вьетнамский донг",     idr: 0.65  },
  USDT: { flag:"💵",  name:"Tether USDT",           idr: 16300 },
  IDR:  { flag:"🇮🇩", name:"Индонезийская рупия",  idr: 1     },
};

// Пары из бота
const PAIRS = [
  { from:"USD",  to:"IDR",  label:"USD → IDR"  },
  { from:"EUR",  to:"IDR",  label:"EUR → IDR"  },
  { from:"RUB",  to:"IDR",  label:"RUB → IDR"  },
  { from:"AUD",  to:"IDR",  label:"AUD → IDR"  },
  { from:"SGD",  to:"IDR",  label:"SGD → IDR"  },
  { from:"VND",  to:"USDT", label:"VND → USDT" },
  { from:"VND",  to:"USD",  label:"VND → USD"  },
  { from:"RUB",  to:"USDT", label:"RUB → USDT" },
  { from:"RUB",  to:"VND",  label:"RUB → VND"  },
];

const FIAT_CURRENCIES  = ["USD","EUR","RUB","AUD","SGD","IDR"];
const CRYPTO_CURRENCIES = ["VND","USDT"];
const ALL_CURRENCIES = [...FIAT_CURRENCIES, ...CRYPTO_CURRENCIES];

let fromCurr = "USD";
let toCurr   = "IDR";
let sheetTarget = "from";

// ── КОНВЕРТАЦИЯ ──────────────────────────────────────────
function getRate(from, to) {
  const fromIdr = RATES[from]?.idr ?? 1;
  const toIdr   = RATES[to]?.idr   ?? 1;
  return fromIdr / toIdr;
}

function convert() {
  const val = parseFloat(document.getElementById("from-input").value);
  if (isNaN(val) || val === 0) {
    document.getElementById("to-input").value = "";
    return;
  }
  const rate   = getRate(fromCurr, toCurr);
  const result = val * rate;
  document.getElementById("to-input").value = formatNum(result);
  updateRateDisplay();
}

function updateRateDisplay() {
  const rate = getRate(fromCurr, toCurr);
  const fromF = RATES[fromCurr]?.flag ?? "";
  const toF   = RATES[toCurr]?.flag   ?? "";
  let rateStr;
  if (rate >= 1000) {
    rateStr = `1 ${fromCurr} = ${formatNum(rate)} ${toCurr}`;
  } else if (rate >= 1) {
    rateStr = `1 ${fromCurr} = ${rate.toFixed(4)} ${toCurr}`;
  } else {
    rateStr = `${formatNum(1/rate)} ${fromCurr} = 1 ${toCurr}`;
  }
  document.getElementById("rate-display").textContent = rateStr;
}

function formatNum(n) {
  if (n >= 1) return Math.round(n).toLocaleString("ru-RU");
  return n.toFixed(6);
}

function setAmount(n) {
  document.getElementById("from-input").value = n;
  convert();
}

function swapCurrencies() {
  [fromCurr, toCurr] = [toCurr, fromCurr];
  updateCurrencyUI();
  convert();
}

function updateCurrencyUI() {
  document.getElementById("from-flag").textContent = RATES[fromCurr]?.flag ?? "";
  document.getElementById("from-code").textContent = fromCurr;
  document.getElementById("to-flag").textContent   = RATES[toCurr]?.flag   ?? "";
  document.getElementById("to-code").textContent   = toCurr;
  updateRateDisplay();
}

// ── SHEET (валюты) ───────────────────────────────────────
function openSheet(target) {
  sheetTarget = target;
  const current = target === "from" ? fromCurr : toCurr;
  const opts = document.getElementById("sheet-options");
  opts.innerHTML = ALL_CURRENCIES.map(code => {
    const c = RATES[code];
    return `
      <div class="currency-option" onclick="selectCurrency('${code}')">
        <span class="curr-flag">${c.flag}</span>
        <div class="curr-info">
          <div class="curr-code-big">${code}</div>
          <div class="curr-name">${c.name}</div>
        </div>
        ${code === current ? '<span class="curr-check">✓</span>' : ''}
      </div>`;
  }).join("");
  document.getElementById("overlay").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}

function closeSheet() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
}

function selectCurrency(code) {
  if (sheetTarget === "from") fromCurr = code;
  else toCurr = code;
  updateCurrencyUI();
  convert();
  closeSheet();
}

// ── ВКЛАДКИ ──────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-converter").style.display = tab === "converter" ? "" : "none";
  document.getElementById("tab-rates").style.display     = tab === "rates"     ? "" : "none";
  if (tab === "rates") buildRatesTable();
}

function buildRatesTable() {
  const fiatEl   = document.getElementById("fiat-rates");
  const cryptoEl = document.getElementById("crypto-rates");
  const fiatPairs   = PAIRS.filter(p => p.to === "IDR" || p.from === "IDR");
  const otherPairs  = PAIRS.filter(p => p.to !== "IDR" && p.from !== "IDR");

  fiatEl.innerHTML = fiatPairs.map(p => rateItemHtml(p)).join("");
  cryptoEl.innerHTML = otherPairs.map(p => rateItemHtml(p)).join("");
}

function rateItemHtml(p) {
  const rate = getRate(p.from, p.to);
  let rateStr;
  if (rate >= 100)  rateStr = `1 ${p.from} = ${formatNum(rate)} ${p.to}`;
  else if (rate >= 1) rateStr = `1 ${p.from} = ${rate.toFixed(4)} ${p.to}`;
  else rateStr = `${formatNum(1/rate)} ${p.from} = 1 ${p.to}`;

  const ff = RATES[p.from]?.flag ?? "";
  const tf = RATES[p.to]?.flag   ?? "";
  return `
    <div class="rate-item" onclick="quickSelect('${p.from}','${p.to}')">
      <span class="rate-flags">${ff}${tf}</span>
      <div>
        <div class="rate-pair">${p.label}</div>
        <div class="rate-sub">${rateStr}</div>
      </div>
      <span class="rate-num">→</span>
    </div>`;
}

function quickSelect(from, to) {
  fromCurr = from; toCurr = to;
  updateCurrencyUI();
  switchTab("converter", document.querySelectorAll(".tab")[0]);
}

// ── TELEGRAM WEBAPP ──────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  // применяем цвета из темы телеграма если нужно
}

// ── INIT ────────────────────────────────────────────────
updateCurrencyUI();
</script>
</body>
</html>
